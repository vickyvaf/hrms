services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_password
      POSTGRES_DB: hrms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hrms-app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://hrms_user:hrms_password@postgres:5432/hrms_db?schema=public"
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  postgres_data:
