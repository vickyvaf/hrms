services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_password}
      POSTGRES_DB: ${POSTGRES_DB:-hrms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms_user}:${POSTGRES_PASSWORD:-hrms_password}@db:5432/${POSTGRES_DB:-hrms_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-hrms-super-secret-key-2026}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "3000:3000"
    depends_on:
      - db

  studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: pnpm prisma studio --browser none --port 5555 --hostname 0.0.0.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms_user}:${POSTGRES_PASSWORD:-hrms_password}@db:5432/${POSTGRES_DB:-hrms_db}?schema=public
    ports:
      - "5555:5555"
    depends_on:
      - db

volumes:
  postgres_data:
